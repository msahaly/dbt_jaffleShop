version: 2

sources:
  - name: jaffle_shop
    database: dbt-tutorial
    schema: jaffle_shop
    description: A clone of a PostGres application database... mainly a BigQuery
    tables:
      - name: customers
        description: Raw customer data.
        columns:
          - name: id
            description: Primary key for customer data.
            data_tests:
              - unique
              - not_null
              
        
      
      - name: orders
        description: Raw Orders data.
        columns:
          - name: id
            description: Primary key for Order data
            data_tests:
              - unique
              - not_null
              
        config:
          freshness:
            warn_after:
              count: 12
              period: hour
            error_after:
              count: 1
              period: day
          loaded_at_field: _etl_loaded_at
      - name: payments