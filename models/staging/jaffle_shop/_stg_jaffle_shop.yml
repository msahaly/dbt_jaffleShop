models:
  - name: stg_jaffle_shop__customers
    description: The grain of this table is One unique customer per row.
    columns:
      - name: customer_id
        description: Primary key for the customers table
        data_tests:
          - unique
          - not_null
      - name: first_name
        data_tests:
          - not_null
      - name: last_name
        data_tests:
          - not_null
      - name: full_name
        data_tests:
          - not_null

  - name: stg_jaffle_shop__orders
    description: One order per row
    columns:
      - name: order_id
        description: Primary key for the orders table
        data_tests:
          - unique
          - not_null
      - name: order_status
        data_tests:
          - accepted_values:
              #config: # اختياري: إذا أردت إضافة إعدادات إضافية
                #severity: error #error|warn
              arguments: # هنا التعديل الجذري
                values: ['completed', 'shipped', 'placed', 'return_pending', 'returned']
      - name: customer_id
        description: Foreign key with customers table
        data_tests:
          - relationships:
              arguments: 
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_date
        data_tests:
          - not_null
      - name: _etl_loaded_at
        data_tests:
          - not_null
