models:
  - name: stg_stripe__payments
    description: This model consolidates payment data from Stripe, providing a comprehensive view of payment transactions, including details such as payment method, status, and amount. It serves as a foundational dataset for analyzing payment trends and performance.
    columns: 
      - name: payment_id 
        description: A unique identifier for each payment transaction.
        data_tests:
          - unique
          - not_null
          
      
      - name: order_id
        description: The identifier for the order associated with the payment. The Primary key
      - name: payment_method
        description: The method used to process the payment, such as credit card or bank transfer.
      - name: payment_status
        description: The current status of the payment, indicating whether it is completed, pending, or failed.
      - name: amount
        description: The total amount of the payment transaction.
      - name: created_at
        description: The date when the payment was created.
      - name: _batched_at
        description: The datetime when the payment data was batched for processing.